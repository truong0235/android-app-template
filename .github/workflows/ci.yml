name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Android CLI
        run: curl -fsSL https://dl.google.com/android/cli/latest/linux_x86_64/install.sh | bash

      - name: Create template and push to test branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git checkout --orphan test
          git rm -rf . 2>/dev/null || true

          android create --output=./ --name=MyApp

          git add .
          git commit -m "Generate Android project from template"
          git push origin test
