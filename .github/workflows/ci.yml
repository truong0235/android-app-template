name: CI

on:
  workflow_dispatch:
  #push:
  #  branches: [main]
  #pull_request:
  #  branches: [main]

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Android CLI
        run: curl -fsSL https://dl.google.com/android/cli/latest/linux_x86_64/install.sh | bash

      - name: Create template and push to test branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin test 2>/dev/null || true
          git checkout -b test origin/test 2>/dev/null || git checkout --orphan test

          TMP_DIR=$(mktemp -d)
          android create --output="$TMP_DIR" --name=MyApp

          if ! diff -rq "$TMP_DIR" . --exclude=.git 2>/dev/null; then
            git rm -rf . 2>/dev/null || true
            cp -r "$TMP_DIR/." .
            rm -rf "$TMP_DIR"

            git add .
            git commit -m "Generate Android project from template"
            git push origin test
          else
            echo "No changes — skipping push"
          fi
